version: "3.9"

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: biyahero-test-postgres
    environment:
      POSTGRES_USER: biyahero_test
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: biyahero_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biyahero_test -d biyahero_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - postgres_test_data:/var/lib/postgresql/data

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: biyahero-test-dynamodb
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/shell/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  postgres_test_data:
